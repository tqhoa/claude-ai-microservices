services:
  engine:
    build:
      context: ./engine
      target: development
    volumes:
      - ./engine/app:/app/app
    ports:
      - "8000:8000"
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      target: development
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "3000:3000"
    command: pnpm dev --host 0.0.0.0 --port 3000

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
